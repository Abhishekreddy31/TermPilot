<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#388bfd"/>
      <stop offset="100%" style="stop-color:#39d2c0"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.4"/>

  <!-- Terminal window mock -->
  <rect x="640" y="100" width="540" height="380" rx="16" fill="url(#termBg)" stroke="#30363d" stroke-width="2"/>

  <!-- Terminal title bar -->
  <rect x="640" y="100" width="540" height="44" rx="16" fill="#21262d"/>
  <rect x="640" y="128" width="540" height="16" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="668" cy="122" r="7" fill="#f85149" opacity="0.9"/>
  <circle cx="690" cy="122" r="7" fill="#d29922" opacity="0.9"/>
  <circle cx="712" cy="122" r="7" fill="#3fb950" opacity="0.9"/>
  <!-- Title text -->
  <text x="910" y="127" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">term-pilot</text>

  <!-- Terminal content lines -->
  <text x="668" y="175" font-family="monospace" font-size="14" fill="#8b949e">$</text>
  <text x="685" y="175" font-family="monospace" font-size="14" fill="#e6edf3"> npx term-pilot</text>

  <text x="668" y="205" font-family="monospace" font-size="13" fill="#3fb950">=== TermPilot Server ===</text>

  <text x="668" y="230" font-family="monospace" font-size="13" fill="#8b949e">  Local:</text>
  <text x="755" y="230" font-family="monospace" font-size="13" fill="#58a6ff">  http://localhost:3000</text>

  <text x="668" y="255" font-family="monospace" font-size="13" fill="#8b949e">  User:</text>
  <text x="755" y="255" font-family="monospace" font-size="13" fill="#e6edf3">   admin</text>

  <text x="668" y="280" font-family="monospace" font-size="13" fill="#8b949e">  Tunnel:</text>
  <text x="755" y="280" font-family="monospace" font-size="13" fill="#39d2c0"> https://my-app.trycloudflare.com</text>

  <text x="668" y="310" font-family="monospace" font-size="13" fill="#3fb950">========================</text>

  <text x="668" y="345" font-family="monospace" font-size="14" fill="#8b949e">$</text>
  <text x="685" y="345" font-family="monospace" font-size="14" fill="#e6edf3"> echo "Hello from phone"</text>
  <text x="668" y="370" font-family="monospace" font-size="14" fill="#e6edf3">Hello from phone</text>
  <text x="668" y="400" font-family="monospace" font-size="14" fill="#8b949e">$</text>
  <rect x="680" y="388" width="9" height="17" fill="#58a6ff" opacity="0.8"/>

  <!-- Phone mockup outline (left side) -->
  <rect x="120" y="120" width="200" height="400" rx="24" fill="none" stroke="#30363d" stroke-width="3"/>
  <rect x="120" y="120" width="200" height="400" rx="24" fill="#0d1117" opacity="0.9"/>
  <!-- Phone notch -->
  <rect x="180" y="120" width="60" height="4" rx="2" fill="#21262d"/>
  <!-- Phone screen content -->
  <rect x="130" y="140" width="180" height="360" rx="4" fill="#161b22"/>

  <!-- Phone terminal header -->
  <rect x="130" y="140" width="180" height="28" fill="#21262d" rx="4"/>
  <circle cx="144" cy="154" r="4" fill="#3fb950"/>
  <text x="154" y="158" font-family="sans-serif" font-size="10" font-weight="600" fill="#e6edf3">TermPilot</text>

  <!-- Phone tabs -->
  <rect x="130" y="168" width="180" height="20" fill="#1c2128"/>
  <text x="140" y="182" font-family="sans-serif" font-size="8" fill="#58a6ff">Shell 1</text>
  <text x="185" y="182" font-family="sans-serif" font-size="8" fill="#6e7681">Shell 2</text>
  <text x="225" y="182" font-family="sans-serif" font-size="8" fill="#39d2c0">[tmux]</text>

  <!-- Phone terminal output -->
  <text x="138" y="206" font-family="monospace" font-size="8" fill="#8b949e">$ git status</text>
  <text x="138" y="218" font-family="monospace" font-size="8" fill="#3fb950">On branch main</text>
  <text x="138" y="230" font-family="monospace" font-size="8" fill="#e6edf3">nothing to commit</text>
  <text x="138" y="248" font-family="monospace" font-size="8" fill="#8b949e">$ docker ps</text>
  <text x="138" y="260" font-family="monospace" font-size="8" fill="#e6edf3">CONTAINER  STATUS</text>
  <text x="138" y="272" font-family="monospace" font-size="8" fill="#e6edf3">web-app    Up 2h</text>
  <text x="138" y="284" font-family="monospace" font-size="8" fill="#e6edf3">postgres   Up 2h</text>
  <text x="138" y="302" font-family="monospace" font-size="8" fill="#8b949e">$</text>
  <rect x="146" y="294" width="6" height="11" fill="#58a6ff" opacity="0.8"/>

  <!-- Phone voice button -->
  <rect x="165" y="380" width="60" height="22" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="195" y="395" font-family="sans-serif" font-size="9" fill="#e6edf3" text-anchor="middle">Voice</text>

  <!-- Phone extra keys -->
  <rect x="135" y="410" width="170" height="22" rx="4" fill="#1c2128"/>
  <text x="145" y="425" font-family="monospace" font-size="8" fill="#8b949e">Esc</text>
  <text x="165" y="425" font-family="monospace" font-size="8" fill="#8b949e">Tab</text>
  <text x="185" y="425" font-family="monospace" font-size="8" fill="#58a6ff">Ctrl</text>
  <text x="210" y="425" font-family="monospace" font-size="8" fill="#8b949e">|</text>
  <text x="225" y="425" font-family="monospace" font-size="8" fill="#8b949e">~</text>
  <text x="245" y="425" font-family="monospace" font-size="8" fill="#8b949e">/</text>

  <!-- Phone home indicator -->
  <rect x="190" y="494" width="60" height="4" rx="2" fill="#30363d"/>

  <!-- Connection line between phone and terminal -->
  <line x1="320" y1="320" x2="640" y2="290" stroke="url(#accent)" stroke-width="2" stroke-dasharray="8,6" opacity="0.6"/>

  <!-- WebSocket label on the line -->
  <rect x="420" y="290" width="100" height="22" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="470" y="305" font-family="sans-serif" font-size="10" fill="#39d2c0" text-anchor="middle">WebSocket</text>

  <!-- Logo and text (left side, above phone) -->
  <text x="155" y="80" font-family="monospace" font-size="42" font-weight="bold" fill="#39d2c0" text-anchor="middle">&gt;_</text>

  <!-- Main title -->
  <text x="100" y="580" font-family="sans-serif" font-size="48" font-weight="700" fill="#e6edf3">TermPilot</text>

  <!-- Subtitle -->
  <text x="100" y="615" font-family="sans-serif" font-size="18" fill="#8b949e">Control your terminal from your phone.</text>

  <!-- Feature pills bottom right -->
  <rect x="750" y="520" width="80" height="26" rx="13" fill="#388bfd" opacity="0.15" stroke="#388bfd" stroke-width="1"/>
  <text x="790" y="537" font-family="sans-serif" font-size="11" fill="#388bfd" text-anchor="middle">Voice</text>

  <rect x="840" y="520" width="80" height="26" rx="13" fill="#3fb950" opacity="0.15" stroke="#3fb950" stroke-width="1"/>
  <text x="880" y="537" font-family="sans-serif" font-size="11" fill="#3fb950" text-anchor="middle">tmux</text>

  <rect x="930" y="520" width="80" height="26" rx="13" fill="#39d2c0" opacity="0.15" stroke="#39d2c0" stroke-width="1"/>
  <text x="970" y="537" font-family="sans-serif" font-size="11" fill="#39d2c0" text-anchor="middle">Tunnel</text>

  <rect x="1020" y="520" width="80" height="26" rx="13" fill="#d29922" opacity="0.15" stroke="#d29922" stroke-width="1"/>
  <text x="1060" y="537" font-family="sans-serif" font-size="11" fill="#d29922" text-anchor="middle">PWA</text>

  <rect x="1110" y="520" width="80" height="26" rx="13" fill="#a371f7" opacity="0.15" stroke="#a371f7" stroke-width="1"/>
  <text x="1150" y="537" font-family="sans-serif" font-size="11" fill="#a371f7" text-anchor="middle">Free</text>

  <!-- npx command bottom -->
  <text x="750" y="600" font-family="monospace" font-size="22" fill="#8b949e">$</text>
  <text x="775" y="600" font-family="monospace" font-size="22" fill="#e6edf3"> npx term-pilot</text>
</svg>
